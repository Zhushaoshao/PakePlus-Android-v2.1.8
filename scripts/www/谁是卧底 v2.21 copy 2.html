<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>谁是卧底 - 实时多人在线</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>	
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

		const firebaseConfig = {
		  apiKey: "AIzaSyD5ut-CmCZCI-ZYaET2uE5mnA1z0957FQY",
		  authDomain: "undercover-game-9e8ea.firebaseapp.com",
		  databaseURL: "https://undercover-game-9e8ea-default-rtdb.asia-southeast1.firebasedatabase.app",
		  projectId: "undercover-game-9e8ea",
		  storageBucket: "undercover-game-9e8ea.firebasestorage.app",
		  messagingSenderId: "468892362797",
		  appId: "1:468892362797:web:6beba09d676d9b2ce970a4"
		};

        let db = null;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.database();
        } catch (error) {
            console.error("Firebase error:", error);
        }

        const UndercoverGame = () => {
            const [screen, setScreen] = useState('login');
            const [playerName, setPlayerName] = useState('');
            const [roomCode, setRoomCode] = useState('');
            const [currentPlayerId, setCurrentPlayerId] = useState(null);
            const [room, setRoom] = useState(null);
            const [copied, setCopied] = useState(false);
            const [error, setError] = useState('');
            const [cardRotation, setCardRotation] = useState(0);
            const [customWords, setCustomWords] = useState([]);
            const [showWordLibrary, setShowWordLibrary] = useState(false);
            const [newCivilianWord, setNewCivilianWord] = useState('');
            const [newUndercoverWord, setNewUndercoverWord] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [editingIndex, setEditingIndex] = useState(null);
            const [editCivilianWord, setEditCivilianWord] = useState('');
            const [editUndercoverWord, setEditUndercoverWord] = useState('');
            const [joinDisabled, setJoinDisabled] = useState(false);
            const roomRef = useRef(null);

            const defaultWordPairs = [
                { civilian: '保温杯', undercover: '骨灰盒' },
			    { civilian: '宠物狗', undercover: '男子汉' },
			    { civilian: '咖啡店', undercover: '坟头' },
			    { civilian: '爷爷', undercover: '雪茄' },
			    { civilian: '退休', undercover: '去世' },
			    { civilian: '野狗', undercover: '老人' },
			    { civilian: '牛魔王', undercover: '丈母娘' },
			    { civilian: '电脑', undercover: '岳父' },
			    { civilian: '猫头鹰', undercover: '奶奶' },
			    { civilian: '哥们', undercover: '牲口' }
            ];

            const wordPairs = [...defaultWordPairs, ...customWords];

            const cardColors = [
                'from-blue-400 to-blue-600',
                'from-purple-400 to-purple-600',
                'from-pink-400 to-pink-600',
                'from-green-400 to-green-600',
                'from-yellow-400 to-yellow-600',
                'from-red-400 to-red-600',
                'from-indigo-400 to-indigo-600',
                'from-teal-400 to-teal-600'
            ];

            // 3D旋转卡片动画
            useEffect(() => {
                if (screen === 'login' && !showWordLibrary) {
                    const interval = setInterval(() => {
                        setCardRotation(prev => (prev + 1) % 360);
                    }, 50);
                    return () => clearInterval(interval);
                }
            }, [screen, showWordLibrary]);

            useEffect(() => {
                if (!db) {
                    setError('Firebase 未配置');
                }
                // 加载自定义词库(包括修改后的系统词库)
                const savedWords = localStorage.getItem('allWordPairs');
                if (savedWords) {
                    try {
                        const parsed = JSON.parse(savedWords);
                        setCustomWords(parsed);
                    } catch (e) {
                        console.error('加载词库失败');
                    }
                }
            }, []);

            useEffect(() => {
			if (!db || !roomCode || screen === 'login') return;

			roomRef.current = db.ref(`rooms/${roomCode}`);
			
			const handleUpdate = (snapshot) => {
				const data = snapshot.val();
				if (data) {
					// 检查自己是否还在房间内
					if (currentPlayerId && !data.players?.[currentPlayerId]) {
						alert('您已被房主移除');
						setRoom(null);
						setCurrentPlayerId(null);
						setRoomCode('');
						setScreen('login');
						return;
					}
					setRoom(data);
				} else {
					// 房间被删除
					alert('房间已解散');
					setRoom(null);
					setCurrentPlayerId(null);
					setRoomCode('');
					setScreen('login');
				}
			};

			roomRef.current.on('value', handleUpdate);
			return () => roomRef.current && roomRef.current.off('value', handleUpdate);
			}, [roomCode, screen, currentPlayerId]);

            useEffect(() => {
                if (!room) return;
                if (room.gameState === 'game' && screen === 'lobby') setScreen('game');
                else if (room.gameState === 'result' && screen === 'game') setScreen('result');
                else if (room.gameState === 'lobby' && screen === 'result') setScreen('lobby');
            }, [room]);

            const createRoom = async () => {
                if (!db || !playerName.trim()) {
                    alert('请输入昵称');
                    return;
                }

                const newRoomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                const playerId = Date.now().toString();
                
                const newRoom = {
                    code: newRoomCode,
                    hostId: playerId,
                    players: {
                        [playerId]: {
                            id: playerId,
                            name: playerName,
                            isReady: true,
                            isOut: false
                        }
                    },
                    settings: { totalPlayers: 6, undercovers: 1 },
                    gameState: 'lobby',
                    gameData: null
                };

                try {
                    await db.ref(`rooms/${newRoomCode}`).set(newRoom);
                    setRoomCode(newRoomCode);
                    setCurrentPlayerId(playerId);
                    setScreen('lobby');
                } catch (err) {
                    alert('创建失败');
                }
            };

            const joinRoom = async () => {
				if (!db || !playerName.trim() || !roomCode.trim()) {
					alert('请填写完整信息');
					return;
				}

				// 防止重复点击
				if (joinDisabled) {
					return;
				}

				setJoinDisabled(true);

				try {
					const upperRoomCode = roomCode.toUpperCase();
					const snapshot = await db.ref(`rooms/${upperRoomCode}`).once('value');
					const existingRoom = snapshot.val();

					if (!existingRoom) {
						alert('房间不存在');
						setJoinDisabled(false);
						return;
					}

					if (existingRoom.gameState !== 'lobby') {
						alert('游戏已开始,无法加入');
						setJoinDisabled(false);
						return;
					}

					const names = Object.values(existingRoom.players || {}).map(p => p.name);
					if (names.includes(playerName)) {
						alert('昵称已被使用');
						setJoinDisabled(false);
						return;
					}

					const playerId = Date.now().toString();
					
					// 使用事务确保原子性操作
					await db.ref(`rooms/${upperRoomCode}/players/${playerId}`).set({
						id: playerId,
						name: playerName,
						isReady: false,
						isOut: false,
						joinedAt: Date.now()
					});

					setCurrentPlayerId(playerId);
					setRoomCode(upperRoomCode);
					setScreen('lobby');
					
					// 2秒后解除限制
					setTimeout(() => setJoinDisabled(false), 2000);

				} catch (err) {
					console.error('加入失败:', err);
					alert('加入房间失败,请重试');
					setJoinDisabled(false);
				}
			};

            const updateRoom = async (path, value) => {
                if (!db || !roomCode) return;
                try {
                    await db.ref(`rooms/${roomCode}/${path}`).set(value);
                } catch (err) {
                    console.error('更新失败');
                }
            };

            const toggleReady = () => {
                if (room && room.players && room.players[currentPlayerId]) {
                    updateRoom(`players/${currentPlayerId}/isReady`, !room.players[currentPlayerId].isReady);
                }
            };

            const updateSettings = (key, value) => {
                updateRoom(`settings/${key}`, parseInt(value) || 1);
            };

            const startGame = async () => {
                if (!room || !room.players) return;
				
				// 💡 每次重开先清空旧题目，确保不复用旧词
				await db.ref(`rooms/${roomCode}/gameData`).set(null);
                
                const playerList = Object.values(room.players);
                
                // 检查人数
                if (playerList.length < 3) {
                    alert('至少需要3名玩家才能开始游戏');
                    return;
                }

                // 检查是否达到设定人数
                if (playerList.length < room.settings.totalPlayers) {
                    const confirmed = window.confirm(
                        `当前 ${playerList.length} 人,设定人数 ${room.settings.totalPlayers} 人\n是否继续开始游戏?`
                    );
                    if (!confirmed) return;
                }

                // 检查所有人是否准备
                const notReadyPlayers = playerList.filter(p => !p.isReady);
                if (notReadyPlayers.length > 0) {
                    alert(`还有 ${notReadyPlayers.length} 名玩家未准备:\n${notReadyPlayers.map(p => p.name).join(', ')}`);
                    return;
                }

                // 检查卧底人数是否合理
                if (room.settings.undercovers >= playerList.length) {
                    alert('卧底人数不能大于等于玩家总数');
                    return;
                }

                // 获取有效词库
                const activeWords = getActiveWordPairs();
                if (activeWords.length === 0) {
                    alert('词库为空,无法开始游戏');
                    return;
                }

                // 显示加载提示
                console.log('AI正在生成题目...');

                let wordPair;
                try {
                    // 尝试使用AI生成新题目
                    const examples = activeWords.slice(0, 8).map(pair => 
                        `${pair.civilian} vs ${pair.undercover}`
                    ).join(', ');

					const randomSeed = `${Math.random().toString(36).substring(2, 8)}_${Date.now()}`;
                    
                    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer sk-5c6938797e484c5d983a0bcc803dc31d'
                        },
                        body: JSON.stringify({
                            model: 'deepseek-chat',
                            messages: [{
                                role: 'user',
                                content: `(${randomSeed}) 参考以下"谁是卧底"游戏词库风格:
${examples}

要求:
1. 核心就是让词组 “表面像、内核反差大”，越离谱越有笑料
2. 找 “场景 / 形态有点像，但实际完全不搭边、甚至反差到荒诞” 的两个词，越不挨边越容易出梗，不用管题材限制！
3. 不用纠结 “合理”，越放飞越好玩！比如可以往 “长辈亲戚 vs 奇葩事物”“日常行为 vs 离谱行为”“可爱东西 vs 硬核东西” 上靠，只要两个词有 1 个小共同点（场景 / 形态），剩下的全是反差就对了
4. 不要重复已有词语
5. 适合口头描述,容易混淆
6. 只返回JSON格式: {"civilian": "平民词", "undercover": "卧底词"}
7. 不要任何其他文字
8. 如果是再一次请求，说明我没有采纳你之前的输出结果，请重新输出
9. 用词要通俗易懂一些

直接返回JSON,不要markdown格式:`
                            }],
                            temperature: 0.9,
                            max_tokens: 100
                        })
                    });

                    const data = await response.json();
                    
                    if (data.choices && data.choices[0] && data.choices[0].message) {
                        const text = data.choices[0].message.content.trim();
                        const jsonMatch = text.match(/\{[^}]+\}/);
                        if (jsonMatch) {
                            const parsed = JSON.parse(jsonMatch[0]);
                            if (parsed.civilian && parsed.undercover) {
                                wordPair = parsed;
                                console.log('AI生成题目:', wordPair);
                            }
                        }
                    }
                } catch (error) {
                    console.error('AI生成失败,使用词库随机:', error);
                }

                // 如果AI生成失败,从词库随机选择
                if (!wordPair) {
                    wordPair = activeWords[Math.floor(Math.random() * activeWords.length)];
                    console.log('词库随机题目:', wordPair);
                }

                const playerIds = playerList.map(p => p.id);
                
                for (let i = playerIds.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [playerIds[i], playerIds[j]] = [playerIds[j], playerIds[i]];
                }

                const gameData = {
                    wordPair,
                    assignments: {}
                };

                playerIds.forEach((playerId, idx) => {
                    gameData.assignments[playerId] = {
                        word: idx < room.settings.undercovers ? wordPair.undercover : wordPair.civilian,
                        role: idx < room.settings.undercovers ? 'undercover' : 'civilian',
                        color: cardColors[idx % cardColors.length]
                    };
                });

                const resetPlayers = {};
                Object.keys(room.players).forEach(pid => {
                    resetPlayers[pid] = { ...room.players[pid], isOut: false };
                });

                try {
                    await db.ref(`rooms/${roomCode}`).update({
                        gameState: 'game',
                        gameData,
                        players: resetPlayers
                    });
                } catch (err) {
                    console.error('开始失败');
                    alert('游戏启动失败');
                }
            };

            const togglePlayerOut = async (playerId) => {
                if (!room || !room.players || !room.players[playerId]) return;
                
                // 强制限制只有房主可以操作
                if (!isHost) {
                    alert("只有房主可以进行淘汰操作！");
                    return;
                }
                
                const player = room.players[playerId];
                const newOutState = !player.isOut;
                const actionText = newOutState ? '淘汰' : '恢复';
                
                // 增加确认操作，防止误点
                const confirmed = window.confirm(`【确认操作】\n确定要 ${actionText} 玩家 "${player.name}" 吗？`);
                if (!confirmed) return;
                
                try {
                    await updateRoom(`players/${playerId}/isOut`, newOutState);
                    // 传入最新状态进行立即判定
                    checkGameEnd(playerId, newOutState);
                } catch (err) {
                    console.error('更新状态失败');
                }
            };

            const checkGameEnd = async (changedPlayerId, newOutState) => {
                if (!room || !room.players || !room.gameData) return;

                const playerList = Object.values(room.players);
                
                // 构造最新的存活玩家列表（包含刚才被点击的玩家）
                const active = playerList.filter(p => {
                    if (p.id === changedPlayerId) return !newOutState;
                    return !p.isOut;
                });
                
                const activeUnder = active.filter(p => room.gameData.assignments[p.id]?.role === 'undercover').length;
                const activeCiv = active.filter(p => room.gameData.assignments[p.id]?.role === 'civilian').length;

                let winner = null;
                // 卧底死光平民赢；平民数量 <= 卧底数量 卧底赢
                if (activeUnder === 0) winner = 'civilian';
                else if (activeCiv <= activeUnder) winner = 'undercover';

                if (winner) {
                    try {
                        await db.ref(`rooms/${roomCode}`).update({ gameState: 'result', winner });
                    } catch (err) {
                        console.error('结束失败');
                    }
                }
            };

            const restartGame = async () => {
                if (!room || !room.players) return;

                const resetPlayers = {};
                Object.keys(room.players).forEach(pid => {
                    resetPlayers[pid] = { 
                        ...room.players[pid], 
                        isReady: pid === room.hostId,
                        isOut: false 
                    };
                });

                try {
                    await db.ref(`rooms/${roomCode}`).update({
                        gameState: 'lobby',
                        gameData: null,
                        winner: null,
                        players: resetPlayers
                    });
                } catch (err) {
                    console.error('重启失败');
                }
            };

            const copyRoomCode = () => {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(roomCode).then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    }).catch(() => {
                        // Fallback方法
                        const textArea = document.createElement('textarea');
                        textArea.value = roomCode;
                        textArea.style.position = 'fixed';
                        textArea.style.left = '-999999px';
                        document.body.appendChild(textArea);
                        textArea.select();
                        try {
                            document.execCommand('copy');
                            setCopied(true);
                            setTimeout(() => setCopied(false), 2000);
                        } catch (err) {
                            alert(`房间号: ${roomCode}`);
                        }
                        document.body.removeChild(textArea);
                    });
                } else {
                    alert(`房间号: ${roomCode}\n请手动复制`);
                }
            };

            const leaveRoom = async () => {
                if (!room || !currentPlayerId) return;
                
                const confirmed = window.confirm('确定要退出房间吗?');
                if (!confirmed) return;

                try {
                    // 如果是房主且还有其他玩家,转移房主权限
                    if (isHost && playerList.length > 1) {
                        const nextHost = playerList.find(p => p.id !== currentPlayerId);
                        await db.ref(`rooms/${roomCode}/hostId`).set(nextHost.id);
                    }
                    
                    // 删除玩家
                    await db.ref(`rooms/${roomCode}/players/${currentPlayerId}`).remove();
                    
                    // 如果房间空了,删除房间
                    if (playerList.length === 1) {
                        await db.ref(`rooms/${roomCode}`).remove();
                    }
                    
                    // 重置状态
                    setRoom(null);
                    setCurrentPlayerId(null);
                    setRoomCode('');
                    setScreen('login');
                } catch (err) {
                    console.error('退出失败:', err);
                    alert('退出房间失败');
                }
            };
			
            const kickPlayer = async (playerId, playerName) => {
				if (!isHost) {
					alert('只有房主可以踢人');
					return;
				}

				const confirmed = window.confirm(`确定要踢出玩家 "${playerName}" 吗?`);
				if (!confirmed) return;

				try {
					await db.ref(`rooms/${roomCode}/players/${playerId}`).remove();
					alert(`已踢出 ${playerName}`);
				} catch (err) {
					console.error('踢人失败:', err);
					alert('踢人失败,请重试');
				}
			};
			
            const addCustomWord = () => {
                if (!newCivilianWord.trim() || !newUndercoverWord.trim()) {
                    alert('请填写完整的词语对');
                    return;
                }
                
                const newPair = {
                    civilian: newCivilianWord.trim(),
                    undercover: newUndercoverWord.trim(),
                    isCustom: true
                };
                
                const updatedWords = [...customWords, newPair];
                setCustomWords(updatedWords);
                localStorage.setItem('allWordPairs', JSON.stringify(updatedWords));
                
                setNewCivilianWord('');
                setNewUndercoverWord('');
                alert('添加成功!');
            };

            const deleteWord = (index) => {
                const confirmed = window.confirm('确定删除这组词语吗?');
                if (!confirmed) return;
                
                const allWords = [...defaultWordPairs, ...customWords];
                const wordToDelete = allWords[index];
                
                // 如果是默认词库,标记为删除
                if (index < defaultWordPairs.length) {
                    const updatedWords = customWords.filter(w => 
                        !(w.civilian === wordToDelete.civilian && w.undercover === wordToDelete.undercover)
                    );
                    // 添加删除标记
                    updatedWords.push({
                        civilian: wordToDelete.civilian,
                        undercover: wordToDelete.undercover,
                        deleted: true
                    });
                    setCustomWords(updatedWords);
                    localStorage.setItem('allWordPairs', JSON.stringify(updatedWords));
                } else {
                    // 自定义词库直接删除
                    const customIndex = index - defaultWordPairs.length;
                    const updatedWords = customWords.filter((_, i) => i !== customIndex);
                    setCustomWords(updatedWords);
                    localStorage.setItem('allWordPairs', JSON.stringify(updatedWords));
                }
            };

            const startEditWord = (index) => {
                const allWords = [...defaultWordPairs, ...customWords];
                const word = allWords[index];
                setEditingIndex(index);
                setEditCivilianWord(word.civilian);
                setEditUndercoverWord(word.undercover);
            };

            const saveEditWord = () => {
                if (!editCivilianWord.trim() || !editUndercoverWord.trim()) {
                    alert('请填写完整的词语对');
                    return;
                }

                const allWords = [...defaultWordPairs, ...customWords];
                const oldWord = allWords[editingIndex];
                
                // 如果是默认词库
                if (editingIndex < defaultWordPairs.length) {
                    // 先标记旧词为删除
                    const filtered = customWords.filter(w => 
                        !(w.civilian === oldWord.civilian && w.undercover === oldWord.undercover)
                    );
                    // 添加新词
                    filtered.push({
                        civilian: editCivilianWord.trim(),
                        undercover: editUndercoverWord.trim(),
                        isCustom: true,
                        replacedDefault: true
                    });
                    filtered.push({
                        civilian: oldWord.civilian,
                        undercover: oldWord.undercover,
                        deleted: true
                    });
                    setCustomWords(filtered);
                    localStorage.setItem('allWordPairs', JSON.stringify(filtered));
                } else {
                    // 自定义词库直接修改
                    const customIndex = editingIndex - defaultWordPairs.length;
                    const updated = [...customWords];
                    updated[customIndex] = {
                        civilian: editCivilianWord.trim(),
                        undercover: editUndercoverWord.trim(),
                        isCustom: true
                    };
                    setCustomWords(updated);
                    localStorage.setItem('allWordPairs', JSON.stringify(updated));
                }

                setEditingIndex(null);
                setEditCivilianWord('');
                setEditUndercoverWord('');
                alert('修改成功!');
            };

            const cancelEdit = () => {
                setEditingIndex(null);
                setEditCivilianWord('');
                setEditUndercoverWord('');
            };

            // 过滤掉已删除的词语
            const getActiveWordPairs = () => {
				// 获取所有被删除的词
				const deletedWords = customWords
					.filter(w => w.deleted)
					.map(w => `${w.civilian}-${w.undercover}`);

                                    <p className="text-sm text-gray-400 text-center mt-6 max-w-md">
                                        💬 轮流用一句话描述你的词语,但不能说出词语本身
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}

                    {screen === 'result' && room && room.gameData && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4 animate-fade-in">
                            <div className="bg-gradient-to-br from-purple-900/90 to-pink-900/90 rounded-3xl p-12 max-w-2xl w-full border-2 border-white/20 shadow-2xl">
                                <div className="text-center mb-8">
                                    <div className="text-7xl mb-4 animate-bounce">
                                        {room.winner === 'civilian' ? '🎉' : '🎭'}
                                    </div>
                                    <h2 className="text-5xl font-bold mb-3">
                                        {room.winner === 'civilian' ? '平民胜利!' : '卧底胜利!'}
                                    </h2>
                                    <p className="text-xl text-gray-300">
                                        {room.winner === 'civilian' ? '成功找出所有卧底' : '卧底存活到最后'}
                                    </p>
                                </div>

                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-blue-500/20 rounded-xl p-6 border border-blue-400/30">
                                        <div className="text-sm mb-2 text-blue-300">平民词语</div>
                                        <div className="text-3xl font-bold">{room.gameData.wordPair.civilian}</div>
                                    </div>
                                    <div className="bg-red-500/20 rounded-xl p-6 border border-red-400/30">
                                        <div className="text-sm mb-2 text-red-300">卧底词语</div>
                                        <div className="text-3xl font-bold">{room.gameData.wordPair.undercover}</div>
                                    </div>
                                </div>

                                <div className="bg-white/10 rounded-xl p-4 mb-6">
                                    <h3 className="text-sm font-semibold mb-3 text-gray-300">角色揭晓</h3>
                                    <div className="grid grid-cols-2 gap-2 text-sm">
                                        {playerList.map((player) => {
                                            const assignment = room.gameData.assignments[player.id];
                                            return (
                                                <div 
                                                    key={player.id} 
                                                    className={`p-2 rounded flex items-center justify-between ${
                                                        assignment.role === 'undercover' 
                                                            ? 'bg-red-500/20 text-red-300' 
                                                            : 'bg-blue-500/20 text-blue-300'
                                                    }`}
                                                >
                                                    <span>{player.name}</span>
                                                    <span className="text-xs opacity-75">
                                                        {assignment.role === 'undercover' ? '🎭 卧底' : '👥 平民'}
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="flex gap-4">
                                    {isHost && (
                                        <button 
                                            onClick={restartGame} 
                                            className="flex-1 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 py-4 rounded-xl font-semibold transition-all transform hover:scale-105"
                                        >
                                            🔄 再来一局
                                        </button>
                                    )}
                                    <button 
                                        onClick={() => window.location.reload()} 
                                        className="flex-1 bg-white/10 hover:bg-white/20 py-4 rounded-xl font-semibold border border-white/20 transition-all"
                                    >
                                        🚪 退出房间
                                    </button>
                                </div>
                                
                                {!isHost && (
                                    <p className="text-center text-sm text-gray-400 mt-4">
                                        等待房主开始下一局或退出房间
                                    </p>
                                )}
                            </div>
                        </div>
                    )}

                    {/* 词库管理弹窗 */}
                    {showWordLibrary && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4" style={{ zIndex: 9999 }}>
                            <div className="bg-gradient-to-br from-slate-900 to-purple-900 rounded-2xl p-4 sm:p-6 md:p-8 w-full max-w-4xl border-2 border-white/20 shadow-2xl max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-3xl font-bold">📚 词库管理</h2>
                                    <button 
                                        onClick={() => setShowWordLibrary(false)} 
                                        className="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl transition-all"
                                    >
                                        ✕ 关闭
                                    </button>
                                </div>

                                {/* 添加新词语 */}
                                <div className="bg-white/10 rounded-2xl p-6 mb-6 border border-white/20">
                                    <h3 className="text-xl font-bold mb-4">➕ 添加新词语对</h3>
                                    
                                    <div className="mb-4">
                                        <button
                                            onClick={generateWordsWithAI}
                                            disabled={isGenerating}
                                            className="w-full bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 py-3 rounded-xl font-semibold transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            {isGenerating ? '⏳ AI生成中...' : '🤖 AI智能生成词语对'}
                                        </button>
                                        <p className="text-xs text-gray-400 mt-2 text-center">
                                            基于现有词库风格,AI自动生成新的相似词语对
                                        </p>
                                    </div>

                                    <div className="relative my-4">
                                        <div className="absolute inset-0 flex items-center">
                                            <div className="w-full border-t border-white/20"></div>
                                        </div>
                                        <div className="relative flex justify-center text-sm">
                                            <span className="px-4 bg-slate-900/50 text-gray-400">或手动添加</span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="block text-sm mb-2 text-gray-300">平民词语</label>
                                            <input
                                                type="text"
                                                value={newCivilianWord}
                                                onChange={(e) => setNewCivilianWord(e.target.value)}
                                                placeholder="例如: 玫瑰"
                                                className="w-full bg-white/5 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-400"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm mb-2 text-gray-300">卧底词语</label>
                                            <div className="flex gap-2 flex-wrap">
                                                <input
                                                    type="text"
                                                    value={newUndercoverWord}
                                                    onChange={(e) => setNewUndercoverWord(e.target.value)}
                                                    placeholder="例如: 月季"
                                                    className="flex-1 bg-white/5 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-400"
                                                />
                                                <button
                                                    onClick={generateSimilarWords}
                                                    disabled={isGenerating || !newCivilianWord}
                                                    className="bg-blue-500/20 hover:bg-blue-500/30 px-4 py-2 rounded-xl border border-blue-400/30 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                                    title="根据平民词AI生成相似卧底词"
                                                >
                                                    {isGenerating ? '⏳' : '🤖'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button 
                                            onClick={addCustomWord} 
                                            className="flex-1 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 py-3 rounded-xl font-semibold transition-all"
                                        >
                                            ➕ 添加到词库
                                        </button>
                                    </div>
                                    <p className="text-xs text-gray-400 mt-3">
                                        💡 提示: 填写平民词后点击 🤖 可自动生成相似的卧底词
                                    </p>
                                </div>

                                {/* 词库列表 */}
                                <div className="bg-white/10 rounded-2xl p-6 border border-white/20">
                                    <h3 className="text-xl font-bold mb-4">📖 当前词库 ({getActiveWordPairs().length}组)</h3>
                                    
                                    <div className="grid md:grid-cols-2 gap-3">
                                        {getActiveWordPairs().map((pair, idx) => {
											const isSystemWord = defaultWordPairs.some(p => 
												p.civilian === pair.civilian && p.undercover === pair.undercover
											);
											const isEditing = editingIndex === idx;
											
											return (
												<div 
													key={`${pair.civilian}-${pair.undercover}-${idx}`}
													className={`rounded-xl p-3 border transition-all ${
														isSystemWord 
															? 'bg-white/5 border-white/20' 
															: 'bg-purple-500/20 border-purple-400/30'
													}`}
												>
													{isEditing ? (
														<div className="space-y-2">
                                                            <input
                                                                type="text"
                                                                value={editCivilianWord}
                                                                onChange={(e) => setEditCivilianWord(e.target.value)}
                                                                className="w-full bg-white/10 border border-white/20 rounded px-2 py-1 text-sm text-white"
                                                                placeholder="平民词"
                                                            />
                                                            <input
                                                                type="text"
                                                                value={editUndercoverWord}
                                                                onChange={(e) => setEditUndercoverWord(e.target.value)}
                                                                className="w-full bg-white/10 border border-white/20 rounded px-2 py-1 text-sm text-white"
                                                                placeholder="卧底词"
                                                            />
                                                            <div className="flex gap-2">
                                                                <button
                                                                    onClick={saveEditWord}
                                                                    className="flex-1 bg-green-500/30 hover:bg-green-500/40 text-xs py-1 rounded transition-all"
                                                                >
                                                                    ✓ 保存
                                                                </button>
                                                                <button
                                                                    onClick={cancelEdit}
                                                                    className="flex-1 bg-gray-500/30 hover:bg-gray-500/40 text-xs py-1 rounded transition-all"
                                                                >
                                                                    ✕ 取消
                                                                </button>
                                                            </div>
                                                        </div>
													) : (
														<div className="flex items-center justify-between">
															<div className="flex gap-3 flex-1">
																<span className="text-blue-300">{pair.civilian}</span>
																<span className="text-gray-500">vs</span>
																<span className="text-red-300">{pair.undercover}</span>
															</div>
															<div className="flex gap-2">
																<button
																	onClick={() => {
																		setEditingIndex(idx);
																		setEditCivilianWord(pair.civilian);
																		setEditUndercoverWord(pair.undercover);
																	}}
																	className="text-blue-400 hover:text-blue-300 text-sm transition-all"
																	title="编辑"
																>
																	✏️
																</button>
																<button
																	onClick={() => {
																		const confirmed = window.confirm('确定删除这组词语吗?');
																		if (!confirmed) return;
																		
																		if (isSystemWord) {
																			// 删除系统词库
																			const updatedWords = [...customWords, {
																				civilian: pair.civilian,
																				undercover: pair.undercover,
																				deleted: true
																			}];
																			setCustomWords(updatedWords);
																			localStorage.setItem('allWordPairs', JSON.stringify(updatedWords));
																		} else {
																			// 删除自定义词库
																			const updatedWords = customWords.filter(w => 
																				!(w.civilian === pair.civilian && w.undercover === pair.undercover)
																			);
																			setCustomWords(updatedWords);
																			localStorage.setItem('allWordPairs', JSON.stringify(updatedWords));
																		}
																	}}
																	className="text-red-400 hover:text-red-300 text-sm transition-all"
																	title="删除"
																>
																	🗑️
																</button>
															</div>
														</div>
													)}
												</div>
											);
										})}
                                    </div>

                                    {getActiveWordPairs().length === 0 && (
                                        <div className="text-center text-gray-400 py-8">
                                            词库为空,请添加词语
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<UndercoverGame />, document.getElementById('root'));
    </script>
</body>
</html>
